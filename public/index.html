<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Handlebars Sandbox</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <main class="layout">
            <h1>Handlebars Sandbox</h1>
            <form id="render-form">
                <label for="template">Шаблон Handlebars</label>
                <textarea id="template" name="template" spellcheck="false">{{greeting}}, {{user.name}}!</textarea>

                <label for="context">JSON контекст</label>
                <textarea id="context" name="context" spellcheck="false">
                  {
                    "greeting": "Привет",
                    "user": {
                      "name": "ИТМО"
                    }
                  }
                </textarea>

                <button type="submit">Отправить на бэк</button>
            </form>

            <section>
                <h2>Результат</h2>
                <pre id="output"></pre>
            </section>
            <p id="error" class="error"></p>
        </main>
        <script src="/app.js"></script>
    </body>
</html>
